name: Deploy matching-service

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy matching-service \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --add-cloudsql-instances swe455hw2:us-central1:lost-found-postgres \
            --set-env-vars NOTIFICATION_URL=https://notification-service-512993707354.us-central1.run.app,DATABASE_URL='postgresql://lostfounduser:LostFound12345!@/lostfound?host=/cloudsql/swe455hw2:us-central1:lost-found-postgres' \
            --quiet
